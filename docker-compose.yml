services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nisha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nisha}
      POSTGRES_DB: nisha
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nisha -d nisha"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:9000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql://nisha:${POSTGRES_PASSWORD:-nisha}@db:5432/nisha
      CORS_ORIGINS: http://localhost:3000
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_BYTES: 5242880
      LOW_STOCK_THRESHOLD: 5
      LOG_LEVEL: INFO
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9000
      API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
